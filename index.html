<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Hasan Taşkın</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:            #0a0b0d;
    --bg-raised:     #131519;
    --line:          #23262c;
    --ink:           #e7e4dc;
    --ink-dim:       #8b9099;
    --field-out:     #f2a65a;  
    --field-in:      #4ea8de; 
    --field-zero:    #e7e4dc;

    --display: "Fraunces", Georgia, serif;
    --body:    "Inter", -apple-system, sans-serif;
    --mono:    "JetBrains Mono", ui-monospace, Menlo, monospace;
  }

  *{ box-sizing:border-box; }

  body{
    background:var(--bg);
    color:var(--ink);
    font-family:var(--body);
    margin:0;
    line-height:1.6;
  }

  .wrap{ max-width:920px; margin:0 auto; padding:0 6vw; }

  .hero{
    padding:16vh 6vw 64px;
    border-bottom:1px solid var(--line);
  }

  h1.title{
    font-family:var(--display);
    font-optical-sizing:auto;
    font-weight:500;
    font-size:clamp(44px, 8vw, 96px);
    line-height:1.02;
    margin:0 0 28px;
    color:#fff;
    letter-spacing:-0.015em;
  }
  h1.title em{
    font-style:italic;
    color:var(--field-out);
  }

  .role{
    font-family:var(--mono);
    font-size:13px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--field-out);
    margin:0 0 24px;
  }

  .hero-bio{
    color:var(--ink-dim);
    font-size:17px;
    max-width:44ch;
    margin:0 0 40px;
  }

  .hero-rule{
    border-top:1px solid var(--line);
    padding-top:18px;
  }

  .eyebrow{
    font-family:var(--mono);
    font-size:12px;
    letter-spacing:0.1em;
    color:var(--ink-dim);
    text-transform:uppercase;
    margin:0;
    display:flex;
    gap:22px;
    flex-wrap:wrap;
  }
  .eyebrow span{ color:var(--ink-dim); }
  .eyebrow strong{ color:var(--field-out); font-weight:500; }

  /* ---------- WORK LIST ---------- */
  .section-label{
    font-family:var(--mono);
    font-size:12px;
    letter-spacing:0.1em;
    text-transform:uppercase;
    color:var(--ink-dim);
    margin:64px 0 20px;
    display:flex;
    align-items:center;
    gap:12px;
  }
  .section-label::after{
    content:"";
    flex:1;
    height:1px;
    background:var(--line);
  }

  .work-list{ display:flex; flex-direction:column; }

  .item{
    display:grid;
    grid-template-columns:52px 1fr auto;
    gap:22px;
    align-items:center;
    text-decoration:none;
    color:inherit;
    padding:22px 16px;
    border-top:1px solid var(--line);
    transition:background .25s ease, padding-left .25s ease;
  }
  .work-list a.item:last-child{ border-bottom:1px solid var(--line); }

  .item:hover{
    background:var(--bg-raised);
    padding-left:22px;
  }

  .icon{
    width:40px;
    height:40px;
    color:var(--ink-dim);
    transition:color .25s ease;
  }
  .item:hover .icon{ color:var(--field-out); }

  .info h3{
    margin:0 0 6px;
    font-family:var(--display);
    font-weight:500;
    font-size:19px;
    color:#fff;
  }
  .info p{
    margin:0;
    font-size:14px;
    color:var(--ink-dim);
    max-width:52ch;
  }

  .tags{
    display:flex;
    gap:8px;
    justify-self:end;
  }
  .tags span{
    font-family:var(--mono);
    font-size:11px;
    color:var(--ink-dim);
    border:1px solid var(--line);
    padding:3px 8px;
    border-radius:3px;
    white-space:nowrap;
  }

  @media (max-width:640px){
    .item{ grid-template-columns:40px 1fr; }
    .tags{ display:none; }
  }

  /* ---------- FOOTER ---------- */
  footer{
    margin-top:90px;
    border-top:1px solid var(--line);
    padding:28px 0 60px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap:16px;
  }
  .contact-links{ display:flex; gap:22px; }
  .contact-links a{
    color:var(--ink-dim);
    text-decoration:none;
    font-family:var(--mono);
    font-size:13px;
    transition:color .2s;
  }
  .contact-links a:hover{ color:var(--field-out); }
  .footer-meta{ font-family:var(--mono); font-size:12px; color:var(--ink-dim); }
</style>
</head>
